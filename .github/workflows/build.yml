name: Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      run: |
        mkdir -p $ANDROID_HOME/cmdline-tools
        cd $ANDROID_HOME/cmdline-tools
        curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o tools.zip
        unzip -q tools.zip
        mv cmdline-tools latest 2>/dev/null || true
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1

    - name: Generate Gradle Wrapper
      run: |
        curl -sL "https://services.gradle.org/distributions/gradle-8.0-bin.zip" -o gradle.zip
        unzip -q gradle.zip
        ./gradle-8.0/bin/gradle wrapper --gradle-version 8.0 --no-daemon
        ./gradle-8.0/bin/gradle --stop 2>/dev/null || true
        rm -rf gradle.zip gradle-8.0

    - name: Download Xposed API
      run: |
        mkdir -p app/libs
        XPOSED_URLS=(
          "https://api.xposed.info/repository/de/robv/android/xposed/api/82/api-82.jar"
          "https://jcenter.bintray.com/de/robv/android/xposed/api/82/api-82.jar"
          "https://repo1.maven.org/maven2/de/robv/android/xposed/api/82/api-82.jar"
        )
        for url in "${XPOSED_URLS[@]}"; do
          if curl -sfL "$url" -o app/libs/api-82.jar 2>/dev/null; then
            echo "Xposed API jar downloaded from $url"
            break
          fi
        done
        if [ ! -f app/libs/api-82.jar ]; then
          echo "Download from maven failed, trying GitHub..."
          curl -sL "https://github.com/rovo89/XposedBridge/raw/master/src/external/xposed.jar" -o app/libs/api-82.jar 2>/dev/null || true
        fi
        ls -la app/libs/

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: NotificationFix-debug
        path: app/build/outputs/apk/debug/app-debug.apk
