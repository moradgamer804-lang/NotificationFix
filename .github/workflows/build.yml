name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      run: |
        mkdir -p $ANDROID_HOME/cmdline-tools
        cd $ANDROID_HOME/cmdline-tools
        curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o cmdline-tools.zip
        unzip -q cmdline-tools.zip
        mv cmdline-tools latest
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1

    - name: Download Gradle Wrapper
      run: |
        curl -sL "https://services.gradle.org/distributions/gradle-8.0-bin.zip" -o gradle.zip
        unzip -q gradle.zip
        ./gradle-8.0/bin/gradle wrapper --gradle-version 8.0
        rm -rf gradle.zip gradle-8.0

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: NotificationFix-debug
        path: app/build/outputs/apk/debug/app-debug.apk
